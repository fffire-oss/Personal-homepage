<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="ZephyrLabs Bilibili video index for match analysis and project notes."
    />
    <title>Bilibili | ZephyrLabs</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="home-shell bilibili-shell" aria-labelledby="bilibili-title">
      <header class="hero compact-hero">
        <a class="brand-mark" href="index.html" aria-label="ZephyrLabs home">ZL</a>
        <p class="eyebrow">Video index</p>
        <div class="bilibili-title-row">
          <h1 id="bilibili-title">Bilibili</h1>
          <a
            class="bilibili-emblem-link"
            href="https://space.bilibili.com/231033317?spm_id_from=333.40164.0.0"
            target="_blank"
            rel="noreferrer"
            aria-label="Open Bilibili profile"
          >
            <span class="bilibili-emblem" aria-hidden="true">
              <span class="bilibili-face">
                <span class="bilibili-eye left"></span>
                <span class="bilibili-eye right"></span>
                <span class="bilibili-mouth"></span>
              </span>
            </span>
          </a>
        </div>
        <p class="summary">
          Match commentary, replay notes, and project updates for Gem Table and AI training.
        </p>
      </header>

      <section class="video-feature" aria-labelledby="video-title">
        <div class="section-heading">
          <h2 id="video-title">Featured video</h2>
          <a href="https://www.bilibili.com/video/BV1JNooBvEhd/?spm_id_from=333.1387.0.0" target="_blank" rel="noreferrer">Open on Bilibili</a>
        </div>
        <div class="video-frame">
          <iframe
            src="https://player.bilibili.com/player.html?bvid=BV1JNooBvEhd&autoplay=0"
            title="Arena rank-1 match breakdown"
            loading="lazy"
            allowfullscreen
          ></iframe>
        </div>
      </section>
    </main>
  </body>
</html>
